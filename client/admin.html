<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weapon Ball - Admin Control Panel</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
      
      body {
        margin: 0; padding: 30px; 
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        font-family: 'Inter', sans-serif;
        color: #2d3748;
        min-height: 100vh;
      }
      h1 {
        text-align: center; color: #1a202c; font-weight: 800;
        margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
      }
      .panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 25px; border-radius: 16px; max-width: 600px;
        margin: 0 auto 20px auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      input { 
        padding: 12px 15px; margin-right: 10px; border-radius: 8px; 
        border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.9); 
        color: #2d3748; width: 100%; box-sizing: border-box; font-size: 15px;
      }
      .flex-row { display: flex; gap: 10px; align-items: center; }
      button { 
        padding: 12px 20px; border-radius: 8px; border: none; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        color: white; font-weight: 600; cursor: pointer; 
        transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0;
      }
      button:hover { 
        transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3); 
      }
      .btn-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #000; }
      .btn-red { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
      .btn-orange { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #000;}
      .btn-blue { background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
      
      h2 { margin-top: 0; color: #4a5568; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 12px; font-size: 20px;}
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
      .status { font-weight: 600; margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.5); }
      .player-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
      .player-item { padding: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>TỔNG ĐÀI ĐIỀU KHIỂN GAME 🎮</h1>
    
    <div class="panel">
      <h2>📡 Kết nối Luồng Live TikTok</h2>
      <div class="flex-row">
        <input type="text" id="adminTiktokId" placeholder="Nhập Username kênh đang LIVE (vd: earclacks)" />
        <button id="adminConnectBtn">Kết Nối OBS</button>
      </div>
      <div id="statusTxt" class="status">🔴 Chưa kết nối...</div>
    </div>

    <div class="panel">
      <h2>🦸‍♂️ Giả Lập Gọi Bóng (Spawn)</h2>
      <div class="grid">
        <button id="btnDrop1">🎁 Thả 1 Người (Hoa hồng)</button>
        <button id="btnDrop10" class="btn-green">🚀 Thả 10 Người (Lên đỉnh!)</button>
        <button id="btnDropBoss" class="btn-red">🐉 Gọi Rồng Boss (500 HP)</button>
      </div>
    </div>
    
    <div class="panel">
      <h2>✨ Giả Lập Buff Quà (Gifts)</h2>
      <div class="grid">
        <button id="btnHeal" class="btn-green">💋 Mưa Nụ Hôn (+HP)</button>
        <button id="btnSpeed" class="btn-orange">⭐ Buff Sao Băng (Tốc quay)</button>
        <button id="btnDamage" class="btn-red">💪 Buff Cơ Bắp (+Sát thương)</button>
        <button id="btnShield" class="btn-blue">🛡️ Buff Khiên (Bảo vệ)</button>
        <button id="btnBurn" class="btn-red">🔥 Lửa Địa Ngục (Thiêu đốt)</button>
      </div>
    </div>

    <div class="panel">
      <h2>📋 Danh Sách Người Chơi (Live)</h2>
      <ul id="playerList" class="player-list">
        <li class="player-item"><i>Chưa có chiến binh nào...</i></li>
      </ul>
    </div>

    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
